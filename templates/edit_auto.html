<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Auto</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/edit.css') }}">
</head>
<body>
    <div class="cont">
        <h2>Editar auto</h2>

        <form method="POST" action="{{ url_for('edit_auto', id=auto[0]) }}">
            <label>Marca:</label><br>
            <input type="text" name="marca" value="{{ auto[3] }}" required><br><br>

            <label>Modelo:</label><br>
            <input type="text" name="modelo" value="{{ auto[4] }}"><br><br>

            <label>Patente:</label><br>
            <input type="text" name="patente" value="{{ auto[5] }}" required><br><br>

            <label>DNI:</label><br>
            <input type="text" name="dni" value="{{ auto[6] }}" required><br><br>

            <label>Teléfono:</label><br>
            <input type="text" name="telefono" value="{{ auto[7] }}"><br><br>

            <label>Horas a estar:</label><br>
            <input type="text" name="horas_a_estar" value="{{ auto[8] }}"><br><br>

            <label>Precio cobrado:</label><br>
            <input type="text" name="precio_cobrado" value="{{ auto[9] }}"><br><br>

            <label>Retirado:</label><br>
            <select name="retirado">
                <option value="No" {% if auto[10] == 'No' %}selected{% endif %}>No</option>
                <option value="Sí" {% if auto[10] == 'Sí' %}selected{% endif %}>Sí</option>
            </select><br><br>

            <button class="btn1" type="submit">Guardar cambios</button>
        </form>

        <br>
        <!-- Único botón para volver al menú -->
        <a href="{{ url_for('menu') }}"><button type="button">Volver al menú</button></a>
    </div>
</body>
</html>
